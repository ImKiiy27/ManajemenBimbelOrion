<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg" style="width:250px;height:250px;">
  <defs>
    <style>
      @keyframes float { 0%, 100% { transform: translateY(0) rotate(0deg); } 50% { transform: translateY(-25px) rotate(-15deg); } }
      .shape { animation: float 8s ease-in-out infinite; }
    </style>
  </defs>
  <g class="shape" opacity="0.7">
    <circle cx="100" cy="100" r="60" fill="url(#grad2)" />
    <circle cx="70" cy="70" r="30" fill="url(#grad3)" opacity="0.6" />
    <circle cx="130" cy="130" r="25" fill="url(#grad3)" opacity="0.5" />
  </g>
  <defs>
    <linearGradient id="grad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00d4aa;stop-opacity:0.7" />
      <stop offset="100%" style="stop-color:#0d6efd;stop-opacity:0.7" />
    </linearGradient>
    <linearGradient id="grad3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ff6b3d;stop-opacity:0.5" />
      <stop offset="100%" style="stop-color:#00d4aa;stop-opacity:0.5" />
    </linearGradient>
  </defs>
</svg>